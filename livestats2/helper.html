<!DOCTYPE html>
<html lang="tw">

<head>
    <link rel="stylesheet" href="https://cdn.rawgit.com/Chalarangelo/mini.css/v3.0.1/dist/mini-default.min.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>取得Twitch認證代碼小幫手</title>
</head>


<body>
    <div class="container">
        <div class="row">
            <div class="col-sm-10">
                <h2>注意，認證代碼有時效性。失效的時候，歡迎回來生成新的認證代碼。</h2>
            </div>
            <div class="col-sm-2"><a href="https://github.com/StinkingBanana/StinkingBanana.github.io/tree/master/livestats2" class="button tertiary">回到Github專案頁面</a></div>
        </div>


        <form id="form1">
            <h4>第一步: 生成Access Token認證代碼</h4>
            <div class="input-group fluid">
                <label for="client_id">請輸入Client-ID: </label>
                <input type="text" id="client_id" placeholder="Client ID" />
                <input type="submit" value="生成">
            </div>
            <p>1. 跑出新視窗登入Twitch</p>
            <p>2. 如果沒有跑出Invlaid Client ID, 網址裡應該有#access_token</p>
            <p>3. 複製整個網址回來這邊進行第二步</p>
        </form>

        <form id="form2">
            <h4>第二步: 擷取認證代碼Access Token</h4>
            <div class="input-group fluid">
                <label for="token">請輸入剛剛複製的網址: </label>
                <input type="text" id="token" placeholder="http://localhost/#access_token=...." />
                <input type="submit" value="擷取">
            </div>
        </form>

        <div class="row hidden" id="result">
            <div class="card fluid">
                <h4>第三步: 總結</h4>
                <p>
                    您的ClientID: <span id="clientID_result" style="color: red;"></span>
                </p>
                <p>
                    您的Toekn: <span id="token_result" style="color: red;"></span>
                </p>
            </div>
        </div>
    </div>
</body>

<script language="javascript" type="text/javascript">
    function getClientID(e) {
        e.preventDefault();
        const client_id = document.getElementById('client_id').value
        localStorage.setItem('twitch_client_id', client_id);
        if (client_id) {
            const authURL = `https://id.twitch.tv/oauth2/authorize?response_type=token&client_id=${client_id}&redirect_uri=http://localhost&scope=viewing_activity_read`
            window.open(authURL);
        }
    }

    function getAccessToken(e) {
        e.preventDefault();
        const client_id = document.getElementById('client_id').value
        const token_pattern = /.*access_token\=(\w+)&/
        let token = document.getElementById('token').value;
        let extract_token = token_pattern.exec(token);
        let result_display = document.getElementById('result');
        let clientID_result = document.getElementById('clientID_result');
        let token_result = document.getElementById('token_result');

        if (extract_token[1]) {
            result_display.classList.remove("hidden");
            console.log(client_id)
            clientID_result.innerText = client_id
            token_result.innerText = extract_token[1]
        }
        else {
            alert("找不到AccessToken, 請聯絡臭蕉")
        }
    }

    const form1 = document.getElementById('form1');
    form1.addEventListener('submit', getClientID);
    const form2 = document.getElementById('form2');
    form2.addEventListener('submit', getAccessToken);

    // 自動記錄 ClientID 不需要每次都輸入
    var local_client_id = localStorage.getItem('twitch_client_id');
    if (local_client_id) {
        document.getElementById('client_id').value = local_client_id
    }
</script>

</html>
